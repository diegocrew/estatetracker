# reality-watch filter rules - edit freely, the crawler validates on start.
# Run `python -m crawler.main --validate-rules` to check your edits.
#
# NOTE: this repo is public, so these preferences are public too. To keep street
# lists / budget private, put a base64-encoded YAML fragment into the Actions
# variable RULES_OVERRIDE_B64 - it is deep-merged over this file at runtime.

search:
  city: Bratislava
  districts: []               # empty list = all districts; e.g. "Bratislava I"
  transaction: predaj         # sale only

filters:                      # hard filters - listing dropped if violated
  min_area_m2: 85             # required: at least 85 m²
  max_area_m2: 300            # drop oversized non-flats / investment objects; null = disabled
  min_price_eur: 20000        # drops "1 €" auction-teaser listings; null = disabled
  max_price_eur: 700000      # budget cap ; null = disabled
  max_price_per_m2: null      # disabled; set a number to cap €/m²
  min_rooms: "4"             # required: 4 rooms or more ("4+" listings pass)
  max_floor: null
  exclude_ground_floor: true
  exclude_houses: true        # drop "dom" / land / vila - flats only
  city_required: true         # drop nearby villages; keep only confirmed Bratislava
  require_balcony: false
  allowed_conditions: []      # empty = all; values: novostavba, povodny_stav, rekonstrukcia
  banned_streets: []
  banned_districts:           # whole-word match on location text; drop too-far boroughs
    - "Rača"                  # too far
    - "Dúbravka"              # too far
  banned_keywords:            # matched in title+description, case/diacritics-insensitive
    - "dražba"
    - "spoluvlastnícky podiel"
    - "objekt"                # commercial / investment objects, not flats
    - "projekt"               # "rezidenčný projekt" investment listings
    - "predzáhrad"            # front garden -> ground floor (predzáhradka/-ou)
    - "prízem"                # prízemie / prízemný -> ground floor
    - "backyard"

scoring:                      # soft preferences - affect score, not inclusion
  preferred_streets: []       # e.g. {name: "Obchodná", bonus: 30}
  preferred_districts: []     # e.g. {name: "Bratislava I", bonus: 10}
  preferred_keywords:         # free-text, matched in title+description (case/diacritics-insensitive)
    - {name: "parkov", bonus: 20}     # parkovanie / parkovacie / parkovacie miesto
    - {name: "garáž", bonus: 20}      # garáž / garážové státie
    - {name: "podzem", bonus: 10}     # extra points for underground (podzemné) parking
  condition_bonus:
    novostavba: 25            # strong preference for new development projects
    rekonstrukcia: 5
  balcony_bonus: 5
  price_per_m2_reference: 4000  # bonus scales with how far below this the listing is

output:
  mode: digest                # digest = one issue per run; issue_per_listing = one each
  min_score_for_issue: 0      # create issue for anything passing hard filters
  labels_by_score:            # applied to the GitHub Issue (highest matching min wins)
    - {min: 40, label: "hot"}
    - {min: 20, label: "interesting"}
    - {min: 0,  label: "match"}
